    const firebaseConfig = {
        apiKey: "AIzaSyAmRsE60jV_KoNP65MyhwhVca4AMU5KzVI",
        authDomain: "xamtable.firebaseapp.com",
        projectId: "xamtable",
        storageBucket: "xamtable.firebasestorage.app",

        appId: "1:541541922734:web:e7c89c7e68b593daeafa3f",
        measurementId: "G-LNSV0QRT4L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- GLOBAL DATA STATE ---
    let globalXP = 1000;
    let studyScore = 700;

    let currentVaultPath = { subjectId: null, chapterId: null };
    let completedTasksHistory = {};
    let activeTasksList = [];
    let lastCheckedDate = getFormattedDate(0);

    const LEAGUES = [

        { name: "Sapphire", class: "league-3" },

    function getActiveWeekId() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const ist = new Date(utc + (3600000 * 5.5)); 
        
        const day = ist.getDay(); 
        const hours = ist.getHours();
        
        let lastSunday = new Date(ist);
        if (day === 0 && hours < 15) {
            lastSunday.setDate(ist.getDate() - 7);
        } else {
            lastSunday.setDate(ist.getDate() - day);
        }
        lastSunday.setHours(15, 0, 0, 0);
        
        return "W_" + lastSunday.getTime();
    }

    async function bootCloudDB() {
        document.getElementById('global-xp-desktop').innerHTML = `<i class="fas fa-spinner fa-spin text-sm text-cyan-400"></i>`;
        document.getElementById('global-xp-mobile').innerHTML = `...`;

        try {
            const docRef = db.collection('xamtable_users').doc(liveUser.email);
            const docSnap = await docRef.get();
            const activeWeek = getActiveWeekId();

            if (docSnap.exists) {
                const data = docSnap.data();
                globalXP = data.globalXP !== undefined ? data.globalXP : 1000;
                studyScore = data.studyScore !== undefined ? data.studyScore : 700;
                vaultData = data.vault || [];
                totalCompletedTasks = data.totalCompletedTasks || 0;
                completedTasksHistory = data.history || {};
                activeTasksList = data.activeTasks || [];
                lastCheckedDate = data.lastCheckedDate || getFormattedDate(0);
                
                weeklyXP = data.weeklyXP || 0;
                currentLeague = data.league || 0;
                cohortId = data.cohortId || "";
                lastLeagueUpdateWeek = data.lastLeagueUpdateWeek || "";
                
                streak = data.streak || 0;
                lastTaskDate = data.lastTaskDate || "";
                
                const todayStrBoot = getFormattedDate(0);
                const yesterdayStrBoot = getFormattedDate(-1);
                if (lastTaskDate !== todayStrBoot && lastTaskDate !== yesterdayStrBoot) {
                    streak = 0;
                }

                if (lastLeagueUpdateWeek !== activeWeek) {
                    await processLeagueResults(activeWeek);
                }
            } else {
                lastLeagueUpdateWeek = activeWeek;
                cohortId = `${activeWeek}_0_${Math.floor(Math.random() * 10)}`; 
                saveUserDB(); 
            }

            updateStatsDisplays();
            restoreActiveTasks();
            
            if(!document.getElementById('view-score').classList.contains('hidden')) updateScoreUI();
            if(!document.getElementById('view-completed').classList.contains('hidden')) {
                renderCalendar();
                loadHistoryForDate(selectedHistoryDate);
                renderAnalytics(); 
            }
            if(!document.getElementById('view-leaderboard').classList.contains('hidden')) {
                startLeaderboardSync();
            }
            // Add initial vault render if they refresh while on the vault tab
            if(!document.getElementById('view-vault').classList.contains('hidden')) {
                renderVaultView('root');
            }

        } catch (error) {
            console.error("Cloud Sync Failed:", error);
            updateStatsDisplays();
            restoreActiveTasks();
        }
    }

    async function processLeagueResults(newActiveWeek) {
        const freshSnap = await db.collection('xamtable_users').doc(liveUser.email).get();
        if (freshSnap.exists && freshSnap.data().lastLeagueUpdateWeek === newActiveWeek) {
            return; 
        }
        let resultMessage = "Week Complete! Continuing in your current league.";
        let resultTitle = "Solid Work";

        if (cohortId && lastLeagueUpdateWeek) {
            const snapshot = await db.collection('xamtable_users')
                .where('cohortId', '==', cohortId)
                .get();
            
           let users = [];
            snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
            
            let scaleDay = new Date().getDay(); 
            if (scaleDay === 0) scaleDay = new Date().getHours() < 15 ? 7 : 0.5;
            if (scaleDay === 0) scaleDay = 0.5; 
            
            const ghostBots = [
                { id: "bot1", studyScore: 840, weeklyXP: (Math.floor(scaleDay * 2.5) + 7) * 20 },
                { id: "bot2", studyScore: 810, weeklyXP: (Math.floor(scaleDay * 2.0) + 6) * 20 },
                { id: "bot3", studyScore: 800, weeklyXP: (Math.floor(scaleDay * 2.0) + 5) * 20 },
                { id: "bot4", studyScore: 790, weeklyXP: (Math.floor(scaleDay * 1.5) + 4) * 20 },
                { id: "bot5", studyScore: 770, weeklyXP: (Math.floor(scaleDay * 1.5) + 4) * 20 },
                { id: "bot6", studyScore: 760, weeklyXP: (Math.floor(scaleDay * 1.2) + 3) * 20 },
                { id: "bot7", studyScore: 750, weeklyXP: (Math.floor(scaleDay * 1.0) + 3) * 20 },
                { id: "bot8", studyScore: 740, weeklyXP: (Math.floor(scaleDay * 1.0) + 2) * 20 },
                { id: "bot9", studyScore: 720, weeklyXP: (Math.floor(scaleDay * 1.0) + 2) * 20 },
                { id: "bot10", studyScore: 680, weeklyXP: (Math.floor(scaleDay * 0.5) + 1) * 20 },
                { id: "bot11", studyScore: 650, weeklyXP: (Math.floor(scaleDay * 0.5) + 1) * 20 },
                { id: "bot12", studyScore: 550, weeklyXP: 0 },
                { id: "bot13", studyScore: 310, weeklyXP: 0 }
            ];
            
            let botsNeeded = 15 - users.length;
            if (botsNeeded > 0) {
                const selectedBots = ghostBots.slice(0, botsNeeded);
                selectedBots.forEach(bot => {
                    if (!users.find(u => u.id === bot.id)) users.push(bot);
                });
            }
            users.sort((a, b) => {
                const xpDiff = (b.weeklyXP || 0) - (a.weeklyXP || 0);
                if (xpDiff !== 0) return xpDiff;
                return (b.studyScore || 700) - (a.studyScore || 700);
            });
            
            const myRankIndex = users.findIndex(u => u.id === liveUser.email);
            const myRank = myRankIndex + 1;
            const totalUsers = users.length;

            if (myRank <= 7 && currentLeague < 9 && totalUsers > 1) {
                currentLeague++;
                resultTitle = "Promoted!";
                resultMessage = `Congratulations! You advanced to the ${LEAGUES[currentLeague].name} League.`;
           } else if (myRank >= (totalUsers - 4) && currentLeague > 0 && totalUsers > 10) {
                currentLeague--;
                resultTitle = "Demoted";
                resultMessage = `You fell behind. Work hard to beat others and climb back up!`;
            }
            
            showLeagueModal(resultTitle, resultMessage);
        }

        weeklyXP = 0;
        lastLeagueUpdateWeek = newActiveWeek;
        cohortId = `${newActiveWeek}_${currentLeague}_${Math.floor(Math.random() * 10)}`;
        saveUserDB();
    }

    function showLeagueModal(title, message) {

    function closeLeagueModal() {
        const modal = document.getElementById('league-modal');
        const content = document.getElementById('league-modal-content');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        setTimeout(() => {

    function saveUserDB() {
        const userDB = {
            name: liveUser.name,
            photo: liveUser.photo,
            globalXP: globalXP,
            studyScore: studyScore,
            totalCompletedTasks: totalCompletedTasks,
            history: completedTasksHistory,
            activeTasks: activeTasksList,
            lastCheckedDate: lastCheckedDate,
            weeklyXP: weeklyXP,
            league: currentLeague,
            cohortId: cohortId,
            lastLeagueUpdateWeek: lastLeagueUpdateWeek,
            streak: streak,
            lastTaskDate: lastTaskDate,
            vault: vaultData,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        db.collection('xamtable_users').doc(liveUser.email).set(userDB)
          .catch(err => console.error("Save failed:", err));
          
        updateStatsDisplays();
    }

    function updateStatsDisplays() {
        document.getElementById('global-xp-desktop').innerHTML = `${globalXP} <span class="text-xs text-slate-400">XP</span>`;

    async function loadFontsToCanvas() {
        try {
            if (!('fonts' in document)) return;
            await document.fonts.ready;
        } catch(e) { console.error("Font load skip", e) }
    }

    function drawNativeAvatar(ctx, name, x, y, size) {
        const firstLetter = (name && name.length > 0) ? name[0].toUpperCase() : 'A';
        
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip(); 

        const avGrad = ctx.createLinearGradient(x - size, y - size, x + size, y + size);
        avGrad.addColorStop(0, '#0ea5e9'); 
        avGrad.addColorStop(1, '#2563eb'); 
        ctx.fillStyle = avGrad;
        ctx.fillRect(x - size, y - size, size * 2, size * 2);

        ctx.fillStyle = "white";
        ctx.font = `900 ${size * 1.1}px 'Plus Jakarta Sans'`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(firstLetter, x, y + (size * 0.1));
        ctx.restore();
    }

    async function flexRank() {
        const shareDataTest = { title: "Test", text: "Testing", files: [new File([""], "t.png", {type: "image/png"})] };
        if (!navigator.canShare || !navigator.canShare(shareDataTest) || !navigator.share) {
            alert("🚨 Your browser doesn't support sharing generated images. Copied high score text to clipboard instead.");
            let labelText = "Novice Ranger";
            if(studyScore >= 830) labelText = "Truly Warrior";
            else if(studyScore >= 790) labelText = "Elite Vanguard";
            else if(studyScore >= 730) labelText = "Resolute Guardian";
            else if(studyScore >= 700) labelText = "Novice Ranger";
            else if(studyScore >= 500) labelText = "At Risk";
            else labelText = "Studyrupt";
            const text = `I just locked a ${studyScore} (${labelText}) Study Credit Score on XamTable. Beat my discipline. https://xamtable.vercel.app`;
            navigator.clipboard.writeText(text);
            return;
        }

        await loadFontsToCanvas();

        const canvas = document.createElement('canvas');
        canvas.width = 1080;
        canvas.height = 1080;
        const ctx = canvas.getContext('2d');

        const bgGradient = ctx.createLinearGradient(0, 0, 0, 1080);
        bgGradient.addColorStop(0, '#0f172a'); 
        bgGradient.addColorStop(1, '#020617'); 
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, 1080, 1080);

        ctx.beginPath();
        ctx.arc(200, 200, 500, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(6, 182, 212, 0.05)'; 
        ctx.fill();

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 80px 'Plus Jakarta Sans'";
        const xamTableX = canvas.width / 2;
        const xamTableY = 120; 

        const xamText = "Xam";
        const tableText = "Table";
        const xamWidth = ctx.measureText(xamText).width;
        const tableWidth = ctx.measureText(tableText).width;
        const totalWidth = xamWidth + tableWidth;
        const startX = xamTableX - (totalWidth / 2);

        ctx.fillStyle = "white";
        ctx.fillText(xamText, startX + (xamWidth / 2), xamTableY);
        ctx.fillStyle = "#22d3ee"; 
        ctx.fillText(tableText, startX + xamWidth + (tableWidth / 2), xamTableY);
        ctx.restore();

        const avCenter = 350;
        drawNativeAvatar(ctx, liveUser.name, canvas.width / 2, avCenter, 90);

        ctx.fillStyle = "white";
        ctx.font = "700 40px 'Plus Jakarta Sans'";
        ctx.textAlign = "center";
        ctx.fillText("@" + liveUser.name, canvas.width / 2, avCenter + 150);

        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "800 30px 'Plus Jakarta Sans'";
        ctx.fillText("STUDY CREDIT RATING", canvas.width / 2, avCenter + 270);

        ctx.save();
        ctx.shadowColor = "rgba(6, 182, 212, 0.7)"; 
        ctx.shadowBlur = 60;
        ctx.fillStyle = "white";
        ctx.font = "900 250px 'Plus Jakarta Sans'";
        ctx.fillText(studyScore, canvas.width / 2, avCenter + 470);
        ctx.restore();

        let descriptionLabel = "Novice Ranger";
        let labelColor = "text-blue-400"; 
        if(studyScore >= 830) { descriptionLabel = "Truly Warrior"; labelColor = "#facc15"; }
        else if(studyScore >= 790) { descriptionLabel = "Elite Vanguard"; labelColor = "#22d3ee"; }
        else if(studyScore >= 730) { descriptionLabel = "Resolute Guardian"; labelColor = "#10b981"; }
        else if(studyScore >= 700) { descriptionLabel = "Novice Ranger"; labelColor = "#22d3ee"; }
        else if(studyScore >= 500) { descriptionLabel = "At Risk"; labelColor = "#f59e0b"; }
        else { descriptionLabel = "Studyrupt"; labelColor = "#f43f5e"; }

        ctx.fillStyle = labelColor; 
        ctx.font = "900 35px 'Plus Jakarta Sans'";
        ctx.fillText(descriptionLabel.toUpperCase(), canvas.width / 2, avCenter + 540);

        canvas.toBlob(async (blob) => {
            const file = new File([blob], "XamTableRating.png", { type: "image/png" });

    function getFormattedDate(offsetDays = 0) {
        const date = new Date();
        date.setDate(date.getDate() + offsetDays);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

        const inactiveClass = "px-3 py-1 md:px-4 rounded-md text-[10px] md:text-xs font-bold uppercase tracking-widest transition-colors text-slate-400 hover:text-white";

        if(day === 'today') {
            btnToday.className = activeClass;
            btnTomorrow.className = inactiveClass;
        } else {
            btnTomorrow.className = activeClass;
            btnToday.className = inactiveClass;
        }
    }

    function commitNewTask() {
        const input = document.getElementById('taskInput');
        const emptyState = document.getElementById('emptyState');
        const taskText = input.value.trim();
        
        if (taskText === "") return;
        if (activeTasksList.length >= 7) {
            alert("🚨 AI Bouncer: Overload detected. Execute your current targets before adding more.");
            return;
        }

        const lowerTask = taskText.toLowerCase();

        if (/(.)\1{4,}/.test(lowerTask)) {
            alert("🚨 AI Bouncer: Gibberish detected. Take this seriously.");
            return;
        }
        if (taskText.length < 10 || lowerTask.split(" ").length < 2) {
            alert("🚨 AI Bouncer: Target too vague. Be specific (e.g., 'Solve 50 Kinematics MCQs').");
            return;
        }

        const forbiddenWords = ["i love you", "bsdk", "chutiya", "bkl", "suar", "mkc", "fuck", "fuck you", "bc", "mc", "madarchod", "bitch", "asshole", "kutta", "randi"];
        for (let word of forbiddenWords) {
            if (lowerTask.includes(word)) {
                alert("🚨 AI Bouncer: Blocked word detected. Maintain academic decorum.");
                return;
            }
        }

        const distractionWords = [
            "netflix", "movie", "film", "anime", "series", "episode", "cinema",
            "bgmi", "pubg", "valorant", "cod", "gta", "freefire", "game", "gaming", "play", "playing", "match",
            "insta", "instagram", "reel", "reels", "shorts", "snapchat", "tiktok", "facebook", "fb", "scroll", "scrolling", "youtube", "yt",
            "sleep", "sleeping", "nap", "so ja", "sounga", "sone", "bed", "rest", "resting", "soona",
            "eat", "eating", "food", "khana", "lunch", "dinner", "breakfast", "snack", "maggi", "chai", "drink",
            "chill", "chilling", "timepass", "time pass", "bakchodi", "masti", "dost", "friends", "ghumna", "bahar", "walk", "market",
            "music", "song", "songs", "spotify", "playlist", "listen", "listening",
            "bath", "bathe", "shower", "nahana", "wash", "toilet", "poop", "brush",
            "clean", "cleaning", "room", "safai", "kapde", "laundry",
            "nothing", "kuch nahi", "bore", "bored", "idle", "sit", "sitting", "chat", "chatting", "call", "calling", "phone", "talk"
        ];

        const studyWords = [
            "lecture", "lec", "pw", "physics wallah", "unacademy", "allen", "aakash", "physics", "chem", "chemistry", "math", "maths", 
            "bio", "botany", "zoology", "mcq", "pyq", "dpp", "module", "notes", "revision", "ncert", "hcv", "irodov", "cengage", 
            "solve", "read", "chapter", "test", "mock", "paper", "analysis", "video", "one shot", "oneshot"
        ];

        let hasDistraction = distractionWords.some(w => lowerTask.match(new RegExp(`\\b${w}\\b`)));
        let hasAcademicSave = studyWords.some(w => lowerTask.includes(w));

        if (hasDistraction && !hasAcademicSave) {
            alert("🚨 AI Bouncer: This looks like a distraction, not a valid study target. Denied.");
            return;
        }

        if (emptyState) emptyState.style.display = 'none';

        const taskId = 'task-' + Date.now();
        const escapedText = taskText.replace(/"/g, '&quot;');
        const targetDateStr = (activeTargetDay === 'today') ? getFormattedDate(0) : getFormattedDate(1);

        const taskData = {
            id: taskId,
            text: taskText,
            escapedText: escapedText,
            targetDateStr: targetDateStr,
            activeTargetDay: activeTargetDay,
            createdAt: Date.now()
        };

        activeTasksList.push(taskData);
        saveUserDB();

        renderSingleTaskHTML(taskData);
        
        const newEl = document.getElementById(taskId);
        if(newEl) newEl.classList.add('animate-task');

        input.value = "";
    }

    function startTimer(taskId, initialTimeLeft) {
        let timeLeft = initialTimeLeft;
        const interval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(interval);
                lockTaskUI(taskId);
            } else {
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                const timerEl = document.getElementById(`timer-${taskId}`);
                if (timerEl) timerEl.innerText = `${m}:${s}`;
            }
        }, 1000);
        
        const taskEl = document.getElementById(taskId);
        if(taskEl) taskEl.dataset.intervalId = interval;
    }

    function lockTaskUI(taskId) {
        const timerEl = document.getElementById(`timer-${taskId}`);
        const badgeEl = document.getElementById(`timer-badge-${taskId}`);
        const editBtn = document.getElementById(`edit-btn-${taskId}`);
        const deleteBtn = document.getElementById(`delete-btn-${taskId}`); 
        
        if(timerEl && badgeEl) {
            timerEl.innerText = "LOCKED";
            badgeEl.className = "text-slate-400 bg-slate-800/80 px-1.5 py-0.5 md:px-2 rounded border border-slate-600 flex items-center text-[8px] md:text-[10px] uppercase font-bold tracking-wider";
            badgeEl.innerHTML = '<i class="fas fa-server mr-1"></i> LOCKED';
        }
        if (editBtn) editBtn.remove();
        if (deleteBtn) deleteBtn.remove(); 
    }

    function editTask(taskId) {

    function deleteTask(taskId) {
        const task = document.getElementById(taskId);
        if(!task) return;
        
        const tData = activeTasksList.find(x => x.id === taskId);
        if (tData) {
            let timeLeft = 300 - Math.floor((Date.now() - tData.createdAt) / 1000);
            if (timeLeft <= 0) {
                alert("🚨 System Lock: Task cannot be deleted. Face the penalty.");
                return;
            }
        }
        
        clearInterval(task.dataset.intervalId);
        removeActiveTaskFromDB(taskId);

        task.style.opacity = '0';
        task.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
            task.remove();
            const container = document.getElementById('taskListContainer');
            if (container.querySelectorAll('.group').length === 0) { 
                document.getElementById('emptyState').style.display = 'block';
            }
        }, 300);

        const btnToday = document.getElementById(`edit-today-${taskId}`);
        const btnTomorrow = document.getElementById(`edit-tomorrow-${taskId}`);

            t.activeTargetDay = day;
            t.targetDateStr = getFormattedDate(day === 'today' ? 0 : 1);

    function saveTask(taskId) {
        const input = document.getElementById(`input-${taskId}`);
        const title = document.getElementById(`title-${taskId}`);
        const editBox = document.getElementById(`edit-box-${taskId}`);
        
        if (!editBox || input.value.trim() === "") return;
        
        title.innerText = input.value.trim();
        const t = activeTasksList.find(x => x.id === taskId);
        if(t) {
            t.text = input.value.trim();
            t.escapedText = input.value;
            saveUserDB();
        }
        
        title.classList.remove('hidden');
        editBox.classList.add('hidden');
        editBox.classList.remove('flex');
    }

    function removeActiveTaskFromDB(taskId) {
        activeTasksList = activeTasksList.filter(t => t.id !== taskId);
        saveUserDB();
    }

    function completeTask(taskId) {
        const task = document.getElementById(taskId);
        clearInterval(task.dataset.intervalId);
        
        const taskTitle = document.getElementById(`title-${taskId}`).innerText;
        const taskDate = task.dataset.date; 
        
        removeActiveTaskFromDB(taskId);

        const todayStrTask = getFormattedDate(0);
        const yesterdayStrTask = getFormattedDate(-1);
        if (lastTaskDate !== todayStrTask) {
            if (lastTaskDate === yesterdayStrTask) {
                streak++;
            } else {
                streak = 1;
            }
            lastTaskDate = todayStrTask;
        }

        if(!completedTasksHistory[taskDate]) {
            completedTasksHistory[taskDate] = [];
        }
        completedTasksHistory[taskDate].unshift({ title: taskTitle, xp: 20 }); 
        
        totalCompletedTasks++;
        let scoreUp = false;
        if (totalCompletedTasks % 5 === 0) {
            studyScore += 2;
            scoreUp = true;
            updateScoreUI();
        }

        task.classList.remove('border-l-cyan-500');
        task.classList.add('border-emerald-500', 'shadow-[0_0_30px_rgba(16,185,129,0.15)]', 'bg-emerald-950/10');
        document.getElementById(`title-${taskId}`).classList.add('line-through', 'text-slate-500');
        
        const checkBtn = document.getElementById(`check-${taskId}`);
        checkBtn.classList.add('border-emerald-500', 'bg-emerald-500');

        document.getElementById(`edit-btn-${taskId}`)?.remove();

        document.getElementById(`edit-box-${taskId}`)?.remove();

        let rewardText = `<div class="text-emerald-400 font-black text-xs md:text-sm">+20 XP</div>`;
        if (scoreUp) {
            rewardText += `<div class="text-cyan-400 font-black text-[10px] md:text-xs mt-0.5 animate-pulse">+2 SCORE!</div>`;
        }

        const penaltyBox = document.getElementById(`penalty-box-${taskId}`);
        if(penaltyBox) {
            penaltyBox.innerHTML = `
                <div class="text-[8px] md:text-[10px] text-emerald-500 font-bold uppercase tracking-widest mb-0.5">Target Secured</div>
                ${rewardText}
            `;
            penaltyBox.classList.remove('hidden'); 
        }

        globalXP += 20; 
        weeklyXP += 20; 
        saveUserDB();

            task.style.opacity = '0';
            task.style.transform = 'translateX(40px)';
            setTimeout(() => {
                task.remove();
                const container = document.getElementById('taskListContainer');

                    document.getElementById('emptyState').style.display = 'block';

    // ==============================================
    // CALENDAR LOGIC
    // ==============================================
    let currentCalDate = new Date();
    let selectedHistoryDate = getFormattedDate(0);

    function changeMonth(offset) {
        currentCalDate.setMonth(currentCalDate.getMonth() + offset);
        renderCalendar();
    }

    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        const firstDayIndex = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();
        
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById('calendar-month-year').innerText = `${monthNames[month]} ${year}`;
        
        const grid = document.getElementById('calendar-days');
        grid.innerHTML = '';

        for (let i = 0; i < firstDayIndex; i++) {
            grid.innerHTML += `<div class="p-2 md:p-3"></div>`;
        }

        for (let i = 1; i <= lastDay; i++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isSelected = (dStr === selectedHistoryDate);
            const hasTasks = completedTasksHistory[dStr] && completedTasksHistory[dStr].length > 0;

            let baseStyle = "p-1 md:p-1.5 rounded-lg text-center text-[10px] md:text-xs font-bold cursor-pointer transition-all border border-transparent flex flex-col items-center justify-center h-8 md:h-10";
            if (isSelected) {
                baseStyle += " bg-emerald-500 text-black shadow-[0_0_10px_rgba(16,185,129,0.4)]";
            } else if (hasTasks) {
                baseStyle += " bg-emerald-500/20 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/40";
            } else {
                baseStyle += " bg-white/5 text-slate-300 hover:bg-white/10 hover:border-white/20";
            }

            grid.innerHTML += `
                <div onclick="loadHistoryForDate('${dStr}')" class="${baseStyle}">
                    <span>${i}</span>
                    ${hasTasks && !isSelected ? '<div class="w-1 h-1 bg-emerald-400 rounded-full mt-0.5"></div>' : '<div class="w-1 h-1 mt-0.5 opacity-0"></div>'}
                </div>
            `;
        }
    }

    function loadHistoryForDate(dateStr) {
        selectedHistoryDate = dateStr;
        renderCalendar(); 

        document.getElementById('history-date-label').innerText = dateStr;
        
        const listContainer = document.getElementById('historyListContainer');
        const tasks = completedTasksHistory[dateStr];

        if (!tasks || tasks.length === 0) {
            listContainer.innerHTML = `
                <div class="text-center py-6 md:py-10 opacity-30">
                    <i class="fas fa-calendar-day text-2xl md:text-3xl mb-2 md:mb-3 block"></i>
                    <p class="text-[10px] md:text-xs font-bold uppercase tracking-widest">No history recorded.</p>
                </div>
            `;
            return;
        }

        listContainer.innerHTML = '';
        tasks.forEach(task => {
            listContainer.innerHTML += `
                <div class="glass-panel p-3 md:p-4 rounded-xl border border-emerald-500/30 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2 md:gap-3 pr-2 md:pr-4">
                        <i class="fas fa-check-circle text-emerald-400 text-xs md:text-sm shrink-0"></i>
                        <span class="text-xs md:text-sm font-bold text-white break-words line-clamp-2">${task.title}</span>
                    </div>

                </div>
            `;
        });
    }

    // ==============================================
    // WEEKLY ANALYTICS ENGINE
    // ==============================================
    let analyticsWeekOffset = 0;

    function changeAnalyticsWeek(offset) {
        analyticsWeekOffset += offset;
        if (analyticsWeekOffset > 0) analyticsWeekOffset = 0; 
        renderAnalytics();
    }

    function renderAnalytics() {
        const today = new Date();
        const currentDayOfWeek = today.getDay(); 
        
        const startOfWeek = new Date(today);
        startOfWeek.setDate(today.getDate() - currentDayOfWeek + (analyticsWeekOffset * 7));
        
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        const startStr = `${String(startOfWeek.getDate()).padStart(2,'0')}/${String(startOfWeek.getMonth()+1).padStart(2,'0')}`;
        const endStr = `${String(endOfWeek.getDate()).padStart(2,'0')}/${String(endOfWeek.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('analytics-week-label').innerText = `${startStr} - ${endStr}`;

        let maxTasks = 0;
        const weekData = [];
        const days = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
        
        for (let i = 0; i < 7; i++) {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            const dStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            
            const count = completedTasksHistory[dStr] ? completedTasksHistory[dStr].length : 0;
            if (count > maxTasks) maxTasks = count;
            
            weekData.push({ dayName: days[i], dateNum: d.getDate(), count: count, isToday: dStr === getFormattedDate(0) });
        }

        const yAxisMax = Math.max(maxTasks, 5); 
        const chartContainer = document.getElementById('analytics-chart');
        if(!chartContainer) return;

        chartContainer.innerHTML = '';
        
        weekData.forEach(data => {
            const heightPct = data.count === 0 ? 5 : (data.count / yAxisMax) * 100;
            const barColor = data.isToday ? "bg-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.5)]" : (data.count > 0 ? "bg-emerald-500/70 hover:bg-emerald-400" : "bg-white/5");
            const textColor = data.isToday ? "text-cyan-400" : "text-slate-500";
            
            chartContainer.innerHTML += `
                <div class="flex flex-col items-center justify-end h-full flex-1 group relative cursor-pointer">
                    <div class="absolute -top-6 text-[8px] md:text-[10px] font-black text-white opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 px-2 py-0.5 rounded shadow-lg border border-white/10 z-10 pointer-events-none">${data.count}</div>
                    <div class="w-full max-w-[1.5rem] md:max-w-[2.5rem] rounded-t-sm md:rounded-t-md transition-all duration-700 ease-out ${barColor}" style="height: ${heightPct}%;"></div>
                    <div class="flex flex-col items-center mt-1.5 leading-tight">
                        <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-widest ${textColor}">${data.dayName}</span>
                        <span class="text-[7px] md:text-[8px] font-bold opacity-70 ${textColor}">${data.dateNum}</span>
                    </div>
                </div>
            `;
        });
    }

                            </div>
                            <div class="flex flex-col gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                                <button onclick="openVaultModal('edit', 'topic', '${subId}', '${chapId}', '${topic.id}')" class="w-6 h-6 md:w-7 md:h-7 rounded bg-white/5 hover:bg-white/10 text-slate-400 hover:text-cyan-400 flex items-center justify-center"><i class="fas fa-pencil-alt text-[9px] md:text-[10px]"></i></button>
                                <button onclick="deleteVaultItem('topic', '${subId}', '${chapId}', '${topic.id}')" class="w-6 h-6 md:w-7 md:h-7 rounded bg-white/5 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 flex items-center justify-center"><i class="fas fa-trash text-[9px] md:text-[10px]"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    }

    function promptAddVaultItem() {
        let type = currentVaultPath.subjectId === null ? 'subject' : (currentVaultPath.chapterId === null ? 'chapter' : 'topic');
        openVaultModal('add', type, currentVaultPath.subjectId, currentVaultPath.chapterId);
    }

    function openVaultModal(mode, type, subId = null, chapId = null, topId = null) {
        vaultModalState = { mode, type, subId, chapId, topId };
        
        const modal = document.getElementById('vault-modal');
        const titleEl = document.getElementById('vault-modal-title');
        const inputEl = document.getElementById('vault-modal-input');
        const editorSec = document.getElementById('vault-modal-editor-section');
        
        inputEl.value = '';
        vaultQuill.root.innerHTML = '';
        
        titleEl.innerText = `${mode === 'add' ? 'New' : 'Edit'} ${type}`;
        
        if (type === 'topic') {
            editorSec.classList.remove('hidden');
            editorSec.classList.add('flex');
        } else {
            editorSec.classList.add('hidden');
            editorSec.classList.remove('flex');
        }

        if (mode === 'edit') {
            const sub = vaultData.find(s => s.id === subId);
            if (type === 'subject') inputEl.value = sub.name;
            if (type === 'chapter') {
                const chap = sub.chapters.find(c => c.id === chapId);
                inputEl.value = chap.name;
            }
            if (type === 'topic') {
                const chap = sub.chapters.find(c => c.id === chapId);
                const top = chap.topics.find(t => t.id === topId);
                inputEl.value = top.title;
                vaultQuill.root.innerHTML = top.details || '';
            }
        }

        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.children[0].classList.remove('scale-95');
            inputEl.focus();
        }, 10);
    }

    function closeVaultModal() {
        const modal = document.getElementById('vault-modal');
        modal.classList.add('opacity-0');
        modal.children[0].classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    function saveVaultModal() {
        const { mode, type, subId, chapId, topId } = vaultModalState;
        const nameVal = document.getElementById('vault-modal-input').value.trim();
        if (!nameVal) { alert("Title cannot be empty."); return; }

        if (mode === 'add') {
            if (type === 'subject') {
                vaultData.push({ id: 'sub_' + Date.now(), name: nameVal, chapters: [] });
                saveVaultToDB(); renderVaultView('root');
            } 
            else if (type === 'chapter') {
                const sub = vaultData.find(s => s.id === subId);
                sub.chapters.push({ id: 'chap_' + Date.now(), name: nameVal, topics: [] });
                saveVaultToDB(); renderVaultView('subject', subId);
            } 
            else if (type === 'topic') {
                const sub = vaultData.find(s => s.id === subId);
                const chap = sub.chapters.find(c => c.id === chapId);
                const detailsHtml = vaultQuill.root.innerHTML === '<p><br></p>' ? '' : vaultQuill.root.innerHTML;
                chap.topics.push({ id: 'top_' + Date.now(), title: nameVal, details: detailsHtml });
                saveVaultToDB(); renderVaultView('chapter', subId, chapId);
            }
        } 
        else if (mode === 'edit') {
            const sub = vaultData.find(s => s.id === subId);
            if (type === 'subject') {
                sub.name = nameVal;
                saveVaultToDB(); renderVaultView('root');
            }
            else if (type === 'chapter') {
                const chap = sub.chapters.find(c => c.id === chapId);
                chap.name = nameVal;
                saveVaultToDB(); renderVaultView('subject', subId);
            }
            else if (type === 'topic') {
                const chap = sub.chapters.find(c => c.id === chapId);
                const top = chap.topics.find(t => t.id === topId);
                top.title = nameVal;
                top.details = vaultQuill.root.innerHTML === '<p><br></p>' ? '' : vaultQuill.root.innerHTML;
                saveVaultToDB(); renderVaultView('chapter', subId, chapId);
            }
        }
        closeVaultModal();
    }

    function deleteVaultItem(type, subId, chapId = null, topId = null) {
        if(!confirm(`Are you sure you want to delete this ${type}? This action cannot be undone.`)) return;

        if (type === 'subject') {
            vaultData = vaultData.filter(s => s.id !== subId);
            saveVaultToDB(); renderVaultView('root');
        } 
        else if (type === 'chapter') {
            const sub = vaultData.find(s => s.id === subId);
            sub.chapters = sub.chapters.filter(c => c.id !== chapId);
            saveVaultToDB(); renderVaultView('subject', subId);
        } 
        else if (type === 'topic') {
            const sub = vaultData.find(s => s.id === subId);
            const chap = sub.chapters.find(c => c.id === chapId);
            chap.topics = chap.topics.filter(t => t.id !== topId);
            saveVaultToDB(); renderVaultView('chapter', subId, chapId);
        }
    }

    function saveVaultToDB() {
        db.collection('xamtable_users').doc(liveUser.email).update({ vault: vaultData })
          .catch(err => console.error("Vault save failed:", err));
    }

    function exportChapterPDF() {
        if (!currentVaultPath.chapterId) return;
        
        const sub = vaultData.find(s => s.id === currentVaultPath.subjectId);
        const chap = sub.chapters.find(c => c.id === currentVaultPath.chapterId);
        const pdfContainer = document.getElementById('pdf-export-container');
        
        let htmlContent = `
            <div style="font-family: 'Helvetica Neue', Arial, sans-serif; color: #1e293b; padding: 30px;">
                <div style="border-bottom: 2px solid #0ea5e9; padding-bottom: 10px; margin-bottom: 25px;">
                    <h1 style="margin: 0; font-size: 24px; color: #0f172a;">${chap.name}</h1>
                    <p style="margin: 5px 0 0 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">${sub.name}</p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 20px;">
        `;

        chap.topics.forEach(topic => {
            htmlContent += `
                <div style="page-break-inside: avoid;">
                    <h2 style="font-size: 16px; font-weight: bold; color: #0f172a; margin: 0 0 8px 0; border-left: 3px solid #10b981; padding-left: 10px;">${topic.title}</h2>
            `;
            if (topic.details) {
                htmlContent += `
                    <div class="pdf-quill-content" style="font-size: 14px; line-height: 1.6; color: #334155; padding-left: 13px;">
                        ${topic.details}
                    </div>
                `;
            }
            htmlContent += `</div>`;
        });

        htmlContent += `</div></div>`;
        pdfContainer.innerHTML = htmlContent;
        pdfContainer.classList.remove('hidden');

        const opt = {
            margin:       10,
            filename:     `${sub.name.replace(/[^a-z0-9]/gi, '_')}_${chap.name.replace(/[^a-z0-9]/gi, '_')}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(pdfContainer).save().then(() => {
            pdfContainer.classList.add('hidden');
            pdfContainer.innerHTML = '';
        });
    }
</script>
</body>
</html>
